worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout  65;

  # WebSocket upgrade 처리
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
  # HTTP -> HTTPS 리디렉션
  server {
    listen 80;
    server_name bidr.kr www.bidr.kr;  # 실제 도메인으로 변경
    
    # Let's Encrypt 인증서 갱신을 위한 경로
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리디렉션
    location / {
      return 301 https://$host$request_uri;
    }
  }
  server {
    listen 443 ssl http2;
    server_name bidr.kr www.bidr.kr;  # 실제 도메인으로 변경

    # SSL 인증서 경로
    ssl_certificate /etc/letsencrypt/live/bidr.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bidr.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA 라우팅 대응
    location / {
      try_files $uri $uri/ /index.html;
    }

    # API 프록시: /api/v1 -> backend:8080 (경로 유지)
    location /api/v1/ {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;


      # CORS credentials 지원
      proxy_pass_request_headers on;
    }

    # WebSocket(SockJS/STOMP): /ws/chat -> backend:8080
    location /ws/chat/ {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;

      # SockJS 롱폴링/스트리밍 대비
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      # CORS credentials 지원
      proxy_pass_request_headers on;
    }

    # 정적 리소스 캐싱 (선택)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
      try_files $uri =404;
    }
  }
}

