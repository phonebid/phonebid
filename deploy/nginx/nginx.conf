worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout  65;

  # WebSocket upgrade 처리
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }
  # HTTP -> HTTPS 리디렉션
  server {
    listen 80;
    server_name bidr.kr www.bidr.kr;
    
    # Let's Encrypt 인증서 갱신을 위한 경로
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리디렉션
    location / {
      return 301 https://$host$request_uri;
    }
  }
  server {
    listen 443 ssl http2;
    server_name bidr.kr www.bidr.kr;

    # SSL 인증서 경로
    ssl_certificate /etc/letsencrypt/live/bidr.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bidr.kr/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA 라우팅 대응
    location / {
      try_files $uri $uri/ /index.html;
    }

    # SSE 알림 스트림: /api/notifications/stream -> backend:8080
    # 주의: SSE는 /api/v1/ 보다 먼저 선언해야 우선 매칭됨
    location = /api/notifications/stream {
      proxy_pass http://backend:8080/api/notifications/stream;
      proxy_http_version 1.1;

      # SSE를 위한 필수 헤더
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;

      # SSE 버퍼링 방지 (중요!)
      proxy_buffering off;
      proxy_cache off;
      
      # Nginx의 출력 버퍼링도 비활성화
      chunked_transfer_encoding on;
      
      # X-Accel-Buffering 헤더 추가 (일부 환경에서 필요)
      add_header X-Accel-Buffering no;

      # SSE 연결 유지 (30분)
      proxy_read_timeout 1800s;
      proxy_send_timeout 1800s;
      
      # 연결 유지
      proxy_set_header Connection '';
    }

    # API 프록시: /api/v1 -> backend:8080
    location /api/v1/ {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;

      # 필수 헤더 전달
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;

      # 일반 API 타임아웃 (SSE보다 짧게)
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # WebSocket(SockJS/STOMP): /ws/chat -> backend:8080
    location /ws/chat/ {
      proxy_pass http://backend:8080;
      proxy_http_version 1.1;

      # WebSocket 업그레이드
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Cookie $http_cookie;

      # WebSocket 타임아웃
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # 정적 리소스 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
      try_files $uri =404;
    }
  }
}

