services:
  backend:
    image: jooc0311/phonebid-backend:latest
    restart: unless-stopped
    env_file:
      - /opt/phonebid/.env
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    volumes:
      - spring_boot_tmp:/tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: jooc0311/phonebid-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  spring_boot_tmp:

