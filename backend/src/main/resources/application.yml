spring:
  application:
    name: phonebid
  
  # 프로파일 설정 - 개발 환경 기본값
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5433/phonebid
    username: phonebid
    password: phonebid
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# 프론트엔드 URL 설정
frontend:
  url: http://localhost:5173

# 기본 JWT 설정
jwt:
  secret:
    key: ${JWT_SECRET_KEY}

# 기본 OAuth 설정 (환경변수 기반)
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI:https://localhost:8080/api/v1/auth/kakao/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI:https://localhost:8080/api/v1/auth/naver/callback}

cloud:
  aws:
    stack:
      auto: false
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET}
