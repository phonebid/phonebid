spring:
  application:
    name: phonebid
  
  # 프로파일 설정 - 개발 환경 기본값
  profiles:
    active: dev

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 0
      maximum-pool-size: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000


  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB


  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# 프론트엔드 URL 설정
frontend:
  url: http://localhost:5173

# 기본 JWT 설정
jwt:
  secret:
    key: ${JWT_SECRET_KEY}

# 기본 OAuth 설정 (환경변수 기반)
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI:https://localhost:8080/api/v1/auth/kakao/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI:https://localhost:8080/api/v1/auth/naver/callback}

cloud:
  aws:
    stack:
      auto: false
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET}

# PG 결제 설정 (V2)
portone:
  v2:
    store-id: ${PORTONE_STORE_ID}
    api-secret: ${PORTONE_API_SECRET}
    channel-key: ${PORTONE_CHANNEL_KEY}
    webhook-secret: ${PORTONE_WEBHOOK_SECRET}

# Rate Limiting 설정
rate-limit:
  temp-upload:
    per-minute: 10  # 분당 10회
    per-hour: 30    # 시간당 30회

# SSE (Server-Sent Events) 설정
sse:
  # SSE 연결 타임아웃 시간 (기본값: 30분)
  timeout: 30m
  # Heartbeat 설정
  heartbeat:
    # Heartbeat 활성화 여부 (기본값: true)
    enabled: true
    # Heartbeat 전송 간격 (기본값: 30초)
    interval: 30s
  # Cleanup 스케줄러 설정
  cleanup:
    # Cleanup 활성화 여부 (기본값: true)
    enabled: true
    # Cleanup 실행 간격 (기본값: 10분)
    interval: 10m
  # 리소스 제한 설정
  # 최대 연결 수 (0이면 제한 없음, 기본값: 10000)
  max-connections: 10000
  # 사용자별 최대 중복 연결 수 (기본값: 3)
  max-duplicate-connections-per-user: 3

# 카카오 알림톡 설정 (알리고)
aligo:
  api:
    base-url: https://apis.aligo.in
    user-id: ${ALIGO_USER_ID}
    api-key: ${ALIGO_API_KEY}
  sender:
    key: ${ALIGO_SENDER_KEY}
    phone: ${ALIGO_SENDER_PHONE:}
  template:
    bid-arrived: ${ALIGO_TEMPLATE_BID_ARRIVED:}
    bid-selected: ${ALIGO_TEMPLATE_BID_SELECTED:}
    contract-signed: ${ALIGO_TEMPLATE_CONTRACT_SIGNED:}
    payment-completed: ${ALIGO_TEMPLATE_PAYMENT_COMPLETED:}
    delivery-started: ${ALIGO_TEMPLATE_DELIVERY_STARTED:}
    delivery-completed: ${ALIGO_TEMPLATE_DELIVERY_COMPLETED:}
  timeout:
    connect: 5s
    read: 10s
  retry:
    max-attempts: 3
    backoff-delay: 1s

# Resilience4j 설정
resilience4j:
  # Circuit Breaker 설정
  circuitbreaker:
    instances:
      notification:
        # 실패율 임계값 (50% 이상 실패 시 Circuit Open)
        failure-rate-threshold: 50
        # Circuit Open 시 Half-Open으로 전환하기 전 대기 시간
        wait-duration-in-open-state: 30s
        # Half-Open 상태에서 허용할 호출 수
        permitted-number-of-calls-in-half-open-state: 3
        # Circuit 상태 계산을 위한 슬라이딩 윈도우 크기
        sliding-window-size: 10
        # 슬라이딩 윈도우 타입 (COUNT_BASED: 호출 횟수 기반)
        sliding-window-type: COUNT_BASED
        # Circuit Open 시 실패로 간주할 최소 호출 수
        minimum-number-of-calls: 5
        # 느린 호출로 간주할 시간 (5초 이상)
        slow-call-duration-threshold: 5s
        # 느린 호출 비율 임계값
        slow-call-rate-threshold: 100
        # 기록할 예외 (모든 Exception)
        record-exceptions:
          - java.lang.Exception
  
  # Retry 설정
  retry:
    instances:
      notification:
        # 최대 재시도 횟수 (초기 호출 포함 총 3회)
        max-attempts: 3
        # 재시도 대기 시간 (지수 백오프)
        wait-duration: 1s
        # 지수 백오프 활성화
        enable-exponential-backoff: true
        # 지수 백오프 배율 (1초 -> 2초 -> 4초)
        exponential-backoff-multiplier: 2
        # 재시도 가능한 예외
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.ResourceAccessException
        # 재시도하지 않을 예외
        ignore-exceptions:
          - java.lang.IllegalArgumentException
          - java.lang.IllegalStateException
  
  # Time Limiter 설정
  timelimiter:
    instances:
      notification:
        # 타임아웃 시간 (10초)
        timeout-duration: 10s
        # 타임아웃 시 실행 중인 작업 취소 여부
        cancel-running-future: true