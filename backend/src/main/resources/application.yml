spring:
  application:
    name: phonebid
  
  # 프로파일 설정 - 개발 환경 기본값
  profiles:
    active: dev

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 0
      maximum-pool-size: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000


  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

# 프론트엔드 URL 설정
frontend:
  url: http://localhost:5173

# 기본 JWT 설정
jwt:
  secret:
    key: ${JWT_SECRET_KEY}

# 기본 OAuth 설정 (환경변수 기반)
oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    redirect-uri: ${KAKAO_REDIRECT_URI:https://localhost:8080/api/v1/auth/kakao/callback}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    redirect-uri: ${NAVER_REDIRECT_URI:https://localhost:8080/api/v1/auth/naver/callback}

cloud:
  aws:
    stack:
      auto: false
    region:
      static: ap-northeast-2
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: ${AWS_S3_BUCKET}

# PG 결제 설정 (V2)
portone:
  v2:
    store-id: ${PORTONE_STORE_ID}
    api-secret: ${PORTONE_API_SECRET}
    channel-key: ${PORTONE_CHANNEL_KEY}
    webhook-secret: ${PORTONE_WEBHOOK_SECRET}

# Rate Limiting 설정
rate-limit:
  temp-upload:
    per-minute: 10  # 분당 10회
    per-hour: 30    # 시간당 30회

# SSE (Server-Sent Events) 설정
sse:
  # SSE 연결 타임아웃 시간 (기본값: 30분)
  timeout: 30m
  # Heartbeat 설정
  heartbeat:
    # Heartbeat 활성화 여부 (기본값: true)
    enabled: true
    # Heartbeat 전송 간격 (기본값: 30초)
    interval: 30s
  # Cleanup 스케줄러 설정
  cleanup:
    # Cleanup 활성화 여부 (기본값: true)
    enabled: true
    # Cleanup 실행 간격 (기본값: 10분)
    interval: 10m
  # 리소스 제한 설정
  # 최대 연결 수 (0이면 제한 없음, 기본값: 10000)
  max-connections: 10000
  # 사용자별 최대 중복 연결 수 (기본값: 3)
  max-duplicate-connections-per-user: 3