spring:
  application:
    name: phonebid

  datasource:
    url: jdbc:postgresql://localhost:5433/phonebid
    username: phonebid
    password: phonebid
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

oauth:
  kakao:
    client-id: d5a0b288522bd3c7103156f48be8806c
    redirect-uri: http://localhost:8080/api/v1/auth/kakao/callback
  naver:
    client-id: 7T8kCcHJ6XM0vlOyDjDE
    redirect-uri: http://localhost:8080/api/v1/auth/naver/callback