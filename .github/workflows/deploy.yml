name: deploy

on:
  push:
    branches: ["develop"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            jooc0311/phonebid-backend:latest

      - name: Build & push nginx(frontend) image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          push: true
          tags: |
            jooc0311/phonebid-nginx:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_API_TIMEOUT=${{ secrets.VITE_API_TIMEOUT }}

      - name: Get Github runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://checkip.amazonaws.com)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          # 시크릿에 저장된 키 사용
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add Runner IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32
          
      - name: Upload docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: "/tmp/phonebid-deploy"

      - name: Remote deploy (write .env, pull, up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            sudo mkdir -p /opt/phonebid
            sudo cp /tmp/phonebid-deploy/deploy/docker-compose.yml /opt/phonebid/docker-compose.yml

            # Docker Hub private로 전환해도 계속 동작하도록 서버에서도 login 수행
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # backend 런타임 환경변수 (.env)
            sudo tee /opt/phonebid/.env > /dev/null <<'EOF'
            SPRING_PROFILES_ACTIVE=prod
            AWS_REGION: ap-northeast-2
            AWS_DEFAULT_REGION: ap-northeast-2

            # DB (application-prod.yml 기준)
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

            # JWT
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

            # OAuth (필요 시)
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}
            NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
            NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
            NAVER_REDIRECT_URI=${{ secrets.NAVER_REDIRECT_URI }}

            # AWS S3 (필요 시)
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}

            # PortOne (필요 시)
            PORTONE_STORE_ID=${{ secrets.PORTONE_STORE_ID }}
            PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }}
            PORTONE_CHANNEL_KEY=${{ secrets.PORTONE_CHANNEL_KEY }}
            PORTONE_WEBHOOK_SECRET=${{ secrets.PORTONE_WEBHOOK_SECRET }}
            EOF

            sudo chmod 600 /opt/phonebid/.env

            cd /opt/phonebid
            sudo docker compose pull
            sudo docker compose up -d

      - name: Remove Runner IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress --group-id ${{ secrets.AWS_SG_ID }} --protocol tcp --port 22 --cidr ${{ steps.ip.outputs.ipv4 }}/32